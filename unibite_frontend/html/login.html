<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - UniBite</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="login">

<div class="container">

    <header>
        <h1>UniBite Login</h1>
    </header>

    <form id="login-form">
        <label>Username</label>
        <input type="text" id="username" placeholder="e.g. @cooknwave">

        <label>Password</label>
        <input type="password" id="password">

        <button type="submit">Login</button>
    </form>

    <p>Demo: Use any of @cooknwave, @chefanna, or @foodie with any password.</p>

</div>

<script src="../js/main.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
