<!DOCTYPE html>
<html lang="el">
<head>
    <!-- Page: Meal upload / edit form -->
    <meta charset="UTF-8">
    <title>Upload Meal - UniBite</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="../css/upload.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body data-page="upload">

<div class="container">

    <div id="shared-header"></div>

    <h2 class="profile-title">Upload Meal</h2>

    <!-- Meal upload form: create or edit a listing with details and image -->
    <div class="profile-wrapper upload-wrapper">

        <form id="upload-form" class="upload-form">

            <label class="form-label">Meal Title</label>
            <input type="text" id="meal-title" class="form-input" placeholder="e.g. Homemade Moussaka" required>

            <label class="form-label">Description</label>
            <textarea id="meal-desc" class="form-textarea" placeholder="Short description..." required></textarea>

            <label class="form-label">Category</label>
            <select id="meal-category" class="form-select">
                <option>Breakfast</option>
                <option>Lunch</option>
                <option>Dinner</option>
                <option>Dessert</option>
            </select>

            <label class="form-label">Portions</label>
            <input type="number" id="meal-quantity" class="form-input" min="1" value="1" required>
            <label class="form-label">Select Pickup Point on Map</label>
            <div id="upload-map" style="height:300px;border-radius:12px;margin:10px 0;"></div>
            <p id="pickup-coords-label" style="font-size:13px;color:#666;">
                Click on the map to select pickup point.
            </p>

            <label class="form-label">Pickup Location</label>
            <input type="text" id="meal-location" class="form-input" placeholder="e.g. Dorm 12, Hall C" required>

            <label class="form-label">Pickup Time</label>
            <input type="text" id="meal-time" class="form-input" placeholder="e.g. 18:30" required>

            <label class="form-label">Allergens (optional)</label>
            <div class="filter-dropdown">
                <button id="meal-allergens-btn" type="button" class="filter-btn" aria-expanded="false">Select allergens ▾</button>
                <div id="meal-allergens-dropdown" class="filter-dropdown-menu hidden">
                    <label class="filter-checkbox"><input type="checkbox" value="dairy"> Dairy</label>
                    <label class="filter-checkbox"><input type="checkbox" value="nuts"> Nuts</label>
                    <label class="filter-checkbox"><input type="checkbox" value="gluten"> Gluten</label>
                    <label class="filter-checkbox"><input type="checkbox" value="soy"> Soy</label>
                    <label class="filter-checkbox"><input type="checkbox" value="shellfish"> Shellfish</label>
                    <label class="filter-checkbox"><input type="checkbox" value="eggs"> Eggs</label>
                    <label class="filter-checkbox"><input type="checkbox" value="fish"> Fish</label>
                    <label class="filter-checkbox"><input type="checkbox" value="sesame"> Sesame</label>
                    <label class="filter-checkbox"><input type="checkbox" value="other" id="meal-allergens-other-checkbox"> Other</label>
                    <textarea id="meal-allergens-other" class="form-textarea" placeholder="Specify other allergens..." style="display:none;margin-top:8px;"></textarea>
                </div>
            </div>

            <label class="form-label">Image</label>
            <input type="file" id="meal-image" accept="image/*" class="form-file">
            <div class="image-preview-wrap">
                <img id="image-preview" alt="Preview" class="image-preview" style="display:none;">
            </div>

            <div class="form-actions">
                <button type="submit" class="request-btn upload-submit">Upload</button>
                <a href="profile.html" class="header-btn cancel-btn">Cancel</a>
            </div>

        </form>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="../js/api.js"></script>
<script src="../js/mealService.js"></script>
<script src="../js/main.js"></script>
<script src="../js/upload.js"></script>

</body>
</html>
