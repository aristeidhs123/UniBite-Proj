<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Page: User profile page, profile editing and active listings -->
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body data-page="profile">

<div class="container">

    <div id="shared-header"></div>

    <h2 class="profile-title">Profile</h2>

    <div class="profile-wrapper">

            <div class="profile-top">
            <div class="profile-avatar" id="profile-avatar-placeholder">
                <img id="profile-avatar-image" src="" alt="Profile photo" class="profile-avatar-img" style="display:none;">
                <span id="profile-avatar-initials" class="profile-avatar-initials"></span>
            </div>

            <div class="profile-info">
                <p class="profile-display-name" id="profile-display-name"></p>
                <p class="profile-username">Username: <span id="profile-username"></span></p>
                <p class="profile-points">Points: <span id="profile-points"></span></p>
                <button id="edit-profile-btn" class="header-btn" style="margin-top:12px;">Edit profile</button>
            </div>
        </div>

        <!-- Hidden editing panel: opens when the user clicks Edit profile -->
        <div id="profile-edit-panel" class="profile-edit-panel hidden">
            <form id="profile-form" class="profile-edit-form">
                <label class="form-label" for="profile-display-name-input">Display Name</label>
                <input type="text" id="profile-display-name-input" class="form-input" placeholder="@yourname">

                <label class="form-label" for="profile-email-input">Email</label>
                <input type="email" id="profile-email-input" class="form-input" placeholder="you@example.com">

                <label class="form-label" for="profile-location-input">Location</label>
                <input type="text" id="profile-location-input" class="form-input" placeholder="Patras">

                <label class="form-label" for="profile-photo-input">Profile photo</label>
                <input type="file" id="profile-photo-input" accept="image/*" class="form-file">
                <div class="image-preview-wrap" id="profile-photo-preview-wrap" style="display:none;">
                    <img id="profile-photo-preview" class="image-preview" alt="Photo preview">
                </div>

                <div class="form-actions">
                    <button id="save-profile-btn" type="submit" class="upload-submit">Save</button>
                    <button id="cancel-profile-btn" type="button" class="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>

        <h3>Personal Details</h3>

        <div class="details-box" id="profile-details-box">
            <p id="profile-email-display">Email: -</p>
            <p id="profile-location-display">Location: -</p>
        </div>

        <div class="profile-tabs">
            <button class="profile-tab-btn active" data-tab="meals">Meals Offered</button>
            <button class="profile-tab-btn" data-tab="orders">Meals Ordered</button>
        </div>

        <div id="profile-tab-panels">
            <div id="profile-meals-panel" class="profile-panel">
                <h3>Meals Offered</h3>
                <div id="profile-listings"></div>
            </div>
            <div id="profile-orders-panel" class="profile-panel hidden">
                <h3>Meals Ordered</h3>
                <div id="profile-orders"></div>
            </div>
        </div>

        <div class="upload-btn-wrapper">
            <a href="upload.html" class="upload-btn">
                + Upload Meal
            </a>
        </div>

    </div>

</div>

<script src="../js/mealService.js"></script>
<script src="../js/main.js"></script>
<script src="../js/profile.js"></script>
<script src="../js/ratings.js"></script>

</body>
</html>
